<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InsightFlow Mock App | Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex font-sans select-none">

  <!-- Left Sidebar Panel Icons -->
  <aside class="w-16 border-r border-slate-850 bg-slate-950 flex flex-col items-center py-6 justify-between flex-shrink-0">
    <div class="space-y-6 flex flex-col items-center">
      <a href="index.html" class="w-9 h-9 rounded-xl bg-indigo-650 flex items-center justify-center font-bold text-sm text-white shadow-md shadow-indigo-500/10 hover:bg-indigo-600 transition">IF</a>
      <a href="dashboard.html" class="w-9 h-9 rounded-xl bg-slate-900 border border-slate-800 flex items-center justify-center text-slate-300 font-semibold" title="Analytics Console">📊</a>
      <a href="settings.html" id="sidebar-settings" class="sidebar-settings w-9 h-9 rounded-xl hover:bg-slate-900 flex items-center justify-center text-slate-500 hover:text-slate-300 transition" title="Settings Panel">⚙️</a>
    </div>
    <div class="text-xs text-slate-650">v1.0</div>
  </aside>

  <!-- Right Dashboard Content Pane -->
  <main class="flex-grow p-8 flex flex-col justify-between">
    <div class="flex justify-between items-center mb-6">
      <div>
        <h2 class="text-xl font-bold text-slate-200">Analytics Console Panel</h2>
        <span class="text-[10px] text-slate-500 font-semibold">Live operational data flow tracking</span>
      </div>
      <button 
        id="export" 
        class="export px-4 py-2 bg-indigo-500 hover:bg-indigo-600 text-xs font-bold rounded-xl shadow-lg shadow-indigo-500/10 transition"
      >
        Export PDF Report
      </button>
    </div>

    <!-- Click zoom layout element -->
    <div 
      id="chart-zoom" 
      class="chart-zoom flex-grow border border-dashed border-slate-800 bg-slate-900/40 rounded-2xl p-10 flex flex-col items-center justify-center text-center cursor-crosshair hover:bg-slate-900/60 transition mb-6"
    >
      <span class="text-2xl mb-2">📈</span>
      <span class="text-xs font-bold text-slate-400">Interaction Target Area</span>
      <p class="text-[10px] text-slate-500 max-w-xs mt-1">Click anywhere in this mock chart region to send zoom telemetry events to your analytics board.</p>
    </div>

    <!-- Aggregate stat figures -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="bg-slate-900 border border-slate-850 p-6 rounded-2xl flex flex-col justify-between h-28 hover:border-slate-800 transition">
        <span class="text-[9px] text-slate-500 font-bold uppercase tracking-wider">Average Session Duration</span>
        <span class="text-2xl font-extrabold text-white">4m 12s</span>
      </div>
      <div class="bg-slate-900 border border-slate-850 p-6 rounded-2xl flex flex-col justify-between h-28 hover:border-slate-800 transition">
        <span class="text-[9px] text-slate-500 font-bold uppercase tracking-wider">Conversion rate</span>
        <span class="text-2xl font-extrabold text-white">3.24%</span>
      </div>
    </div>
  </main>

  <script src="http://localhost:5000/tracker/tracker.js" data-host="http://localhost:5000"></script>
</body>
</html>
